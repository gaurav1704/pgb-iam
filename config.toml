[listen]
addr = "127.0.0.1"
port = 6432

[pool]
mode = "session"
strategy = "lifo"
max_size = 10
min_size = 2
reserve_size = 2
idle_timeout_secs = 300
target_host = "localhost"
target_port = 5432
dbname = "postgres"
db_user = "postgres"

[pool.database_limits]
"postgres" = { max_size = 20, min_size = 1 }

[pool.user_limits]
"admin" = { max_size = 15 }

[client_auth]
type = "trust"

[metrics]
enabled = true
listen_addr = "127.0.0.1"
listen_port = 9090

[admin]
enabled = true
listen_addr = "127.0.0.1"
listen_port = 9091

[health_check]
enabled = true
interval_secs = 30
timeout_secs = 5

[tls]
enabled = false
cert_path = "server.crt"
key_path = "server.key"
connect_with_tls = false

[iam]
provider = "aws"
region = "us-east-1"
instance_host = "your-db.xxxxxx.us-east-1.rds.amazonaws.com"
instance_port = 5432
db_user = "iam_user"
