[listen]
addr = "127.0.0.1"
port = 6432

[pool]
min_size = 2
max_size = 10
idle_timeout_secs = 300
target_host = "localhost"
target_port = 5432
dbname = "postgres"
db_user = "postgres"

[metrics]
enabled = true
listen_addr = "127.0.0.1"
listen_port = 9090

[iam]
provider = "Aws"
region = "us-east-1"
instance_host = "your-db.xxxxxx.us-east-1.rds.amazonaws.com"
instance_port = 5432
db_user = "iam_user"
